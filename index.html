<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Found - Lost & Found</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(to right,#e7d1c4,#c6e39a);
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#e9e1da;
}

.logo{
font-weight:bold;
font-size:18px;
}

.nav-links a{
text-decoration:none;
margin:0 12px;
color:#333;
font-size:14px;
}

.signout{
border:1px solid #999;
background:#ddd;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
}

.container{
display:flex;
justify-content:space-between;
align-items:center;
padding:80px 100px;
}

.text h1{
font-size:70px;
line-height:1.1;
}

.green{
color:#2d5c17;
}

.text p{
margin-top:10px;
color:#444;
}

.buttons{
margin-top:25px;
}

.btn{
display:block;
width:160px;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

.lost{
background:#e74c3c;
}

.found{
background:#3cb043;
}

.images{
position:relative;
width:400px;
height:250px;
}

.images img{
width:180px;
border-radius:8px;
position:absolute;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.img1{
top:0;
left:0;
}

.img2{
top:40px;
left:120px;
}

.img3{
top:90px;
left:240px;
}

footer{
background:#e9e1da;
padding:25px 60px;
display:flex;
justify-content:space-between;
margin-top:60px;
}

footer h4{
margin-bottom:10px;
}

footer p{
font-size:14px;
margin:4px 0;
}

.copyright{
text-align:center;
font-size:12px;
padding:10px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">📦 I FOUND</div>

<div class="nav-links">
<a href="Gallery.html">Item Gallery</a>
</div>

</div>

<div class="container">

<div class="text">

<h1>
Find &<br>
Recover<br>
<span class="green">With Ease</span>
</h1>

<p>Experience effortless recovery with our dedicated lost and found service.</p>

<div class="buttons">
    <button class="btn lost" onclick="location.href='Lost.html'">Lost</button>
    <button class="btn found" onclick="location.href='Found.html'">Found</button>
</div>

</div>


<div class="images">

<img class="img1" src="1.jpeg" width="400" height="200">

<img class="img2" src="2.jpeg" width="400" height="200">

<img class="img3" src="3.jpeg" width="400" height="200">

</div>

</div>


<footer>

<div>
<h4>Contact</h4>
<p>Mob.No.: +91 xxxxxxxxxx</p>
<p>Email: abc@gmail.com</p>
</div>

</footer>

<div class="copyright">
© Copyright 2026 Lost and Found
</div>
</body>

</html>
