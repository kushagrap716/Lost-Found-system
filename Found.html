<!DOCTYPE html>

<html>
<head>
<title>Report Found Item</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

body{
background:linear-gradient(to right,#43cea2,#185a9d);
padding-top:80px;
}

/* NAVBAR */

.navbar{
background:white;
position:fixed;
top:0;
width:100%;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.navbar-container{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#185a9d;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
text-decoration:none;
color:#333;
font-weight:500;
}

.nav-links a:hover{
color:#2193b0;
}

/* FORM */

.container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

form{
display:flex;
flex-direction:column;
}

input,textarea{
margin-bottom:12px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px;
background:#3cb043;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">
<div class="navbar-container">

<div class="logo">📦 I FOUND</div>

<div class="nav-links">
<a href="Project.html">Home</a>
<a href="Gallery.html">Item Gallery</a>
<a href="Lost.html">Lost Item</a>
</div>

</div>
</div>

<div class="container">

<h2>Report Found Item</h2>

<form id="foundForm">

<input type="text" id="itemName" placeholder="Item Name" required>

<textarea id="description" placeholder="Description"></textarea>

<input type="date" id="dateFound">

<input type="text" id="locationFound" placeholder="Location Found">

<button type="submit">Submit</button>

</form>

</div>

<script>

document.getElementById("foundForm").addEventListener("submit",function(e){

e.preventDefault();

let item={
name:itemName.value,
description:description.value,
date:dateFound.value,
location:locationFound.value,
status:"inventory"
};

let items=JSON.parse(localStorage.getItem("foundItems"))||[];

items.push(item);

localStorage.setItem("foundItems",JSON.stringify(items));

alert("Item added to inventory");

});

</script>

</body>
</html>
